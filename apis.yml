aid: glama
name: Glama AI
description: >-
  Glama AI operates an MCP (Model Context Protocol) marketplace and gateway
  that aggregates more than 23,000 open-source MCP servers and 4,000 hosted
  connectors, each maintainer-verified, continuously rebuilt, and scored for
  quality and safety. Customers use Glama to discover MCP tools, test them in
  an ephemeral MCP Inspector sandbox, host servers on managed infrastructure,
  and route AI client traffic through the Glama Gateway with JSON-RPC logging,
  per-tool access control, managed OAuth, and usage analytics. The platform
  also exposes an AI Gateway that unifies access to OpenAI, Anthropic, Google,
  DeepSeek, Mistral, and xAI models. Pricing is a freemium SaaS with paid
  tiers at $9, $26, and $80/month that bundle AI credits and hosted MCP server
  slots; open-source MCP maintainers can host for free.
