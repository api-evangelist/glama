    name: Glama MCP Marketplace & Gateway
    description: >-
      Glama's MCP platform indexes open-source MCP servers and hosted
      connectors, offers an ephemeral MCP Inspector, hosts MCP servers on
      managed infrastructure, and proxies MCP traffic through the Glama
      Gateway with logging, OAuth credential management, per-tool access
      control, and analytics. Works with Claude Desktop, Claude Code, ChatGPT,
      Cursor, Windsurf, VS Code, Zed, and JetBrains IDEs.
