    features:
      - name: MCP Marketplace
        description: Searchable registry of 23,000+ MCP servers and 4,000+ connectors with quality and safety scoring.
      - name: Tool-Level Search
        description: Search across 167,000+ individual MCP tool capabilities, not just servers.
      - name: MCP Inspector
        description: Ephemeral sandbox to test any MCP server URL with raw JSON-RPC visibility and shareable debug sessions.
      - name: One-Click MCP Hosting
        description: Deploy MCP servers on managed infrastructure with Gateway integration and call analytics.
      - name: Glama Gateway
        description: Reverse proxy for MCP servers with JSON-RPC logging, per-tool ACLs, managed OAuth, and usage analytics.
      - name: AI Gateway
        description: Unified API across OpenAI, Anthropic, Google, DeepSeek, Mistral, and xAI models.
      - name: MCP Client Compatibility
        description: Works with Claude Desktop, Claude Code, ChatGPT, Cursor, Windsurf, VS Code, Zed, and JetBrains.
      - name: OAuth Credential Management
        description: Managed OAuth flows for connectors so users don't handle raw tokens.
      - name: Quality & Safety Scoring
        description: Continuous rebuilds and per-server scoring covering quality and safety dimensions.
    useCases:
      - name: Discover MCP Tools
        description: Browse and search a curated catalog of MCP servers and connectors.
      - name: Host MCP Servers
        description: Deploy and operate MCP servers on managed infrastructure without running your own boxes.
      - name: Govern MCP Traffic
        description: Log JSON-RPC calls and enforce per-tool access control through the Gateway.
      - name: Multi-Model LLM Access
        description: Route prompts across providers through a single AI Gateway endpoint.
      - name: Debug MCP Servers
        description: Use the MCP Inspector to reproduce and share JSON-RPC traces.
    integrations:
      - name: Claude Desktop
